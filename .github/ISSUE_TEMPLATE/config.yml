#blank_issues_enabled: false
#contact_links: []
#issue_templates:
  - name: User Story
    description: Create a user story for the product backlog
    title: "[User Story] "
    labels: ["user-story"]
    assignees:
      - UAdharsh
    body:
      - type: markdown
        attributes:
          value: |
            **As a** [role]  
            **I need** [function]  
            **So that** [benefit]  

            ### Details and Assumptions
            * [document what you know]      

            ### Acceptance Criteria     
            ```gherkin
            Given [some context]
            When [certain action is taken]
            Then [the outcome of action is observed]
            ```
